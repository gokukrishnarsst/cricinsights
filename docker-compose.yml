services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '${DATABASE_PORT:-5433}:5432'
    environment:
      POSTGRES_USER: ${DATABASE_USER:-cricketadmin}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-cricketadmin}
      POSTGRES_DB: ${DATABASE_NAME:-cricket_ai_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DATABASE_USER:-cricketadmin} -d ${DATABASE_NAME:-cricket_ai_dev}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  flyway:
    image: flyway/flyway:11
    profiles:
      - tools
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./libs/database/flyway/sql:/flyway/sql
    command:
      - -url=jdbc:postgresql://postgres:5432/${DATABASE_NAME:-cricket_ai_dev}
      - -user=${DATABASE_USER:-cricketadmin}
      - -password=${DATABASE_PASSWORD:-cricketadmin}
      - -locations=filesystem:/flyway/sql
      - -connectRetries=10
      - migrate

volumes:
  postgres_data:
